version: "3.8"
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: healynx_db
      POSTGRES_USER: healynx
      POSTGRES_PASSWORD: healynx
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"

  web:
    build: .
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://healynx:healynx@postgres:5432/healynx_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - MINIO_BUCKET=healynx-attachments
      - APP_ENC_KEY=<SET_BASE64_KEY>
      - AADHAAR_PEPPER=changemepepper
      - JWT_RS256_PRIVATE_KEY=<PUT_PRIVATE_PEM_HERE>
      - JWT_RS256_PUBLIC_KEY=<PUT_PUBLIC_PEM_HERE>

volumes:
  pgdata:
  miniodata:
